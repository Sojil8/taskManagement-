<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskTracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/pomodoro.css">
    <script>
        // Protect route
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body class="dashboard-page">
    <nav class="navbar glass-panel">
        <div class="nav-brand">
            <div class="logo-icon"></div>
            <span>TaskTracker</span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="pomodoro.html" class="nav-link">Pomodoro</a>
        </div>
        <div class="nav-actions">
            <button id="logoutBtn" class="btn btn-outline btn-sm">Logout</button>
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h1>Your Tasks</h1>
                <p>Track your progress and hit your deadlines.</p>
            </div>
            <button id="openNewTaskModalBtn" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                New Task
            </button>
        </header>

        <div id="tasksList" class="tasks-grid">
            <!-- Tasks will be injected here via JS -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading your tasks...</p>
            </div>
        </div>
    </main>

    <!-- New Task Modal -->
    <div id="newTaskModal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-card scale-in">
            <div class="modal-header">
                <h2>Create New Task</h2>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>

            <form id="newTaskForm" class="modal-form">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" required placeholder="E.g., Website Redesign">
                </div>

                <div class="form-group">
                    <label for="taskDescription">Description (Optional)</label>
                    <textarea id="taskDescription" rows="2" placeholder="Brief description of the task..."></textarea>
                </div>

                <div class="form-group">
                    <label for="taskDeadline">Deadline</label>
                    <input type="date" id="taskDeadline" required>
                </div>

                <div class="form-group">
                    <label for="taskCategory">Category</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <select id="taskCategory" required style="flex: 1;" disabled>
                            <option value="">Loading categories...</option>
                        </select>
                        <button type="button" id="openNewCategoryModalBtn" class="btn btn-outline btn-sm">New Category</button>
                    </div>
                </div>

                <div class="form-section-title">Checkpoints (Exactly 4 required)</div>
                <div class="checkpoints-inputs">
                    <div class="form-group cp-group">
                        <span class="cp-number">1</span>
                        <input type="text" id="cp1" required placeholder="First milestone...">
                    </div>
                    <div class="form-group cp-group">
                        <span class="cp-number">2</span>
                        <input type="text" id="cp2" required placeholder="Second milestone...">
                    </div>
                    <div class="form-group cp-group">
                        <span class="cp-number">3</span>
                        <input type="text" id="cp3" required placeholder="Third milestone...">
                    </div>
                    <div class="form-group cp-group">
                        <span class="cp-number">4</span>
                        <input type="text" id="cp4" required placeholder="Final review...">
                    </div>
                </div>

                <div id="modalError" class="error-message" style="display: none;"></div>

                <div class="modal-actions">
                    <button type="button" id="cancelModalBtn" class="btn btn-outline">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveTaskBtn">
                        <span>Save Task</span>
                        <div class="spinner" style="display: none;"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- New Category Modal -->
    <div id="newCategoryModal" class="modal-overlay" style="display: none; z-index: 1000;">
        <div class="modal-content glass-card scale-in">
            <div class="modal-header">
                <h2>Create New Category</h2>
                <button id="closeCategoryModalBtn" class="close-btn">&times;</button>
            </div>

            <form id="newCategoryForm" class="modal-form">
                <div class="form-group">
                    <label for="categoryName">Category Name</label>
                    <input type="text" id="categoryName" required placeholder="E.g., Work, Personal">
                </div>

                <div id="categoryModalError" class="error-message" style="display: none;"></div>

                <div class="modal-actions">
                    <button type="button" id="cancelCategoryModalBtn" class="btn btn-outline">Cancel</button>
                    <button type="submit" class="btn btn-primary">
                        <span>Save Category</span>
                        <div class="spinner" style="display: none;"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteConfirmModal" class="modal-overlay" style="display: none; z-index: 1000;">
        <div class="modal-content glass-card scale-in" style="max-width: 400px; text-align: center;">
            <div style="margin-bottom: 1.5rem; color: var(--danger);">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6" />
                </svg>
            </div>
            <h2 style="margin-bottom: 0.5rem;">Delete Task?</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Are you sure you want to delete this task? This action cannot be undone.</p>
            
            <div class="modal-actions" style="justify-content: center; margin-top: 0;">
                <button type="button" id="cancelDeleteBtn" class="btn btn-outline">Cancel</button>
                <button type="button" id="confirmDeleteBtn" class="btn" style="background: var(--danger); color: white; border: none;">
                    <span>Delete</span>
                    <div class="spinner" style="display: none;"></div>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
