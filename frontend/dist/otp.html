<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - TaskTracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/styles-DDzRsouP.js"></script>
  <script type="module" crossorigin src="/assets/config-imWmytUH.js"></script>
  <script type="module" crossorigin src="/assets/auth-Bv5_c3uc.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/styles-CuQ2A1a1.css">
</head>

<body class="auth-page">
    <div class="auth-container glass-card scale-in">
        <div class="auth-header">
            <h1>Verify Your Email</h1>
            <p>We've sent a 6-digit code to <span id="userEmailDisplay" class="highlight-text">your email</span>.</p>
        </div>

        <form id="otpForm" class="auth-form">
            <div class="otp-input-group">
                <input type="text" maxlength="1" class="otp-input" required autofocus>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <button type="submit" class="btn btn-primary btn-block mt-2">
                <span>Verify & Login</span>
                <div class="spinner" style="display: none;"></div>
            </button>
        </form>

        <div class="auth-footer">
            <p>Didn't receive the code? <a href="#" id="resendOtpBtn">Resend</a></p>
            <p><a href="login.html">Back to login</a></p>
        </div>
    </div>

</body>

</html>
