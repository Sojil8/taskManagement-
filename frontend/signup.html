<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TaskTracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="auth-page">
    <div class="auth-container glass-card scale-in">
        <div class="auth-header">
            <h1>Create an Account</h1>
            <p>Join TaskTracker to manage your tasks effectively.</p>
        </div>

        <form id="signupForm" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required autofocus>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" minlength="6"
                    required>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <button type="submit" class="btn btn-primary btn-block">
                <span>Sign Up</span>
                <div class="spinner" style="display: none;"></div>
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Log in here</a></p>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>

</html>
